name: Compile Win ARM64 (Python 3.13)
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'DrissionPage Version'
        required: true
        default: 'v4.1.0.17'

permissions:
  contents: write

jobs:
  build-arm64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          architecture: 'x64'

      - name: Install Dependencies
        run: |
          pip install nuitka requests cssselect setuptools
          choco install upx -y

      - name: Download DrissionPage Source
        shell: pwsh
        run: |
          $V = "${{ github.event.inputs.version }}"
          $URL = "https://github.com/g1879/DrissionPage/archive/refs/tags/$V.zip"
          Invoke-WebRequest -Uri $URL -OutFile "src.zip"
          Expand-Archive "src.zip" -DestinationPath "."
          $Extracted = Get-ChildItem -Directory -Filter "DrissionPage-*" | Select-Object -First 1
          if ($Extracted) { Rename-Item -Path $Extracted.FullName -NewName "DrissionPage" }

      - name: Compile ARM64 via Zig
        shell: pwsh
        run: |
          # We use --zig to bypass the MSVC architecture mismatch
          # --assume-yes-for-downloads allows Nuitka to download Zig automatically
          python -m nuitka --module `
            --lto=yes `
            --zig `
            --follow-import-to=DrissionPage `
            --output-dir=out_arm `
            --assume-yes-for-downloads `
            --jobs=2 `
            DrissionPage

      - name: Prepare Final Binaries & UPX
        shell: pwsh
        run: |
          if (!(Test-Path "out_final")) { New-Item -ItemType Directory -Path "out_final" }
          $file = Get-ChildItem out_arm/*.pyd | Select-Object -First 1
          
          if ($file) {
              $TargetName = "drissionpage_win_arm64.pyd"
              $UpxName = "drissionpage_upx_win_arm64.pyd"
              
              Copy-Item $file.FullName "out_final/$TargetName"
              Copy-Item $file.FullName "out_final/$UpxName"
              
              # UPX (using standard flags)
              upx --best --strip-relocs=0 "out_final/$UpxName"
          } else {
              Write-Error "FATAL: No .pyd file found."
              exit 1
          }

      - name: Upload ARM64 Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-arm64
          path: out_final/
