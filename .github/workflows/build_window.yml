name: Compile DrissionPage to PYD

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'DrissionPage Version (e.g., v4.1.0.17)'
        required: true
        default: 'v4.1.0.17'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          architecture: 'x64'

      - name: Download & Extract DrissionPage
        shell: bash
        run: |
          VERSION="${{ github.event.inputs.version }}"
          URL="https://github.com/g1879/DrissionPage/archive/refs/tags/${VERSION}.zip"
          curl -L -o drission.zip "$URL"
          unzip drission.zip
          # Move the actual package folder to the current directory
          mv DrissionPage-${VERSION/v/}/DrissionPage .

      - name: Install Dependencies
        run: |
          pip install nuitka requests cssselect setuptools
          # Important: Install DrissionPage requirements so Nuitka can resolve them
          pip install -r DrissionPage/requirements.txt || true

      - name: Compile with Nuitka
        shell: bash
        run: |
          python -m nuitka --module \
            --lto=yes \
            --assume-yes-for-downloads \
            --include-package=DrissionPage \
            --output-filename=drissionpage_win_amd64 \
            DrissionPage

      - name: Prepare Assets & Update Pages
        shell: pwsh
        run: |
          $VERSION = "${{ github.event.inputs.version }}"
          $TargetDir = "deploy_folder/releases/$VERSION"
          if (!(Test-Path $TargetDir)) { New-Item -ItemType Directory -Force -Path $TargetDir }
          
          # Nuitka might name it drissionpage_win_amd64.cp310-win_amd64.pyd 
          # We force it to exactly what you want
          $CompiledFile = Get-ChildItem -Filter "drissionpage_win_amd64*.pyd" | Select-Object -First 1
          $FinalName = "drissionpage_win_amd64.pyd"
          
          Copy-Item $CompiledFile.FullName "$TargetDir/$FinalName"
          
          # Generate Hash
          $Hash = (Get-FileHash "$TargetDir/$FinalName" -Algorithm SHA256).Hash
          $Hash | Out-File -FilePath "$TargetDir/hash.txt" -Encoding ascii
          
          # Simple HTML for the version
          $Html = "<html><body><h1>DrissionPage $VERSION</h1><a href='$FinalName'>$FinalName</a><br><a href='hash.txt'>Hash</a></body></html>"
          $Html | Out-File -FilePath "$TargetDir/index.html" -Encoding utf8

      - name: Deploy to GitHub Pages 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: deploy_folder
          branch: gh-pages
          clean: false
