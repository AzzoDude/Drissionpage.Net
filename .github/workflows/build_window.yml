name: Compile DrissionPage to PYD

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'DrissionPage Version (e.g., v4.1.0.17)'
        required: true
        default: 'v4.1.0.17'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          architecture: 'x64'

      - name: Download & Extract DrissionPage
        shell: bash
        run: |
          VERSION="${{ github.event.inputs.version }}"
          URL="https://github.com/g1879/DrissionPage/archive/refs/tags/${VERSION}.zip"
          curl -L -o drission.zip "$URL"
          unzip drission.zip
          EXTRACTED_DIR=$(ls -d DrissionPage-*)
          mv "$EXTRACTED_DIR" DrissionPage

      - name: Install Dependencies
        run: |
          pip install nuitka requests cssselect setuptools
          if (Test-Path "DrissionPage/requirements.txt") {
            pip install -r DrissionPage/requirements.txt
          }

      - name: Compile with Nuitka
        shell: bash
        run: |
          python -m nuitka --module \
            --lto=yes \
            --assume-yes-for-downloads \
            --output-dir=build_out \
            DrissionPage

      - name: Prepare Assets & Update Pages
        shell: pwsh
        run: |
          $VERSION = "${{ github.event.inputs.version }}"
          $DeployDir = "deploy_folder"
          $ReleaseDir = "$DeployDir/releases/$VERSION"
          
          if (!(Test-Path $ReleaseDir)) { New-Item -ItemType Directory -Force -Path $ReleaseDir }
          
          $CompiledFile = Get-ChildItem -Path "build_out" -Filter "DrissionPage*.pyd" | Select-Object -First 1
          $FinalName = "drissionpage_win_amd64.pyd"
          
          if ($CompiledFile) {
              # 1. Copy the binary and hash
              Copy-Item $CompiledFile.FullName "$ReleaseDir/$FinalName"
              $Hash = (Get-FileHash "$ReleaseDir/$FinalName" -Algorithm SHA256).Hash
              $Hash | Out-File -FilePath "$ReleaseDir/hash.txt" -Encoding ascii
              
              # 2. Create the version-specific HTML
              $VersionHtml = @"
          <html>
          <body style='font-family: sans-serif; padding: 30px;'>
            <h1>DrissionPage $VERSION</h1>
            <a href='$FinalName'>Download .pyd</a><br>
            <a href='hash.txt'>SHA256 Hash</a><br><br>
            <a href='../../index.html'>← Back to all releases</a>
          </body>
          </html>
          "@
              $VersionHtml | Out-File -FilePath "$ReleaseDir/index.html" -Encoding utf8

              # 3. CRITICAL: Create the ROOT index.html so you don't get a 404
              $RootHtml = @"
          <html>
          <body style='font-family: sans-serif; padding: 50px; background: #fafafa;'>
            <div style='max-width: 600px; margin: auto; background: white; padding: 20px; border: 1px solid #ddd; border-radius: 8px;'>
              <h2>DrissionPage.Net Releases</h2>
              <hr>
              <p>Latest Build: <strong>$VERSION</strong></p>
              <ul>
                <li><a href='releases/$VERSION/index.html'>View $VERSION Files</a></li>
              </ul>
            </div>
          </body>
          </html>
          "@
              $RootHtml | Out-File -FilePath "$DeployDir/index.html" -Encoding utf8
          } else {
              Write-Error "FATAL: Compiled .pyd file not found!"
              exit 1
          }

      - name: Deploy via Pure Git 🚀
        shell: pwsh
        run: |
          git config --global user.name "AzzoDude"
          git config --global user.email "AzzoDude@users.noreply.github.com"
          
          cd deploy_folder
          git init
          git checkout -b gh-pages
          git add .
          git commit -m "Deploy DrissionPage ${{ github.event.inputs.version }}"
          
          $RepoUrl = "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git push $RepoUrl gh-pages --force
