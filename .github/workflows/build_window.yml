name: Compile DrissionPage to PYD

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'DrissionPage Version (e.g., v4.1.0.17)'
        required: true
        default: 'v4.1.0.17'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          architecture: 'x64'

      - name: Download & Extract DrissionPage
        shell: bash
        run: |
          VERSION="${{ github.event.inputs.version }}"
          URL="https://github.com/g1879/DrissionPage/archive/refs/tags/${VERSION}.zip"
          curl -L -o drission.zip "$URL"
          unzip drission.zip
          
          # Find the extracted folder (e.g., DrissionPage-4.1.0.17)
          EXTRACTED_DIR=$(ls -d DrissionPage-*)
          
          # RENAME to exactly 'DrissionPage' so Nuitka is happy in module mode
          mv "$EXTRACTED_DIR" DrissionPage

      - name: Install Dependencies
        run: |
          pip install nuitka requests cssselect setuptools
          if (Test-Path "DrissionPage/requirements.txt") {
            pip install -r DrissionPage/requirements.txt
          }

      - name: Compile with Nuitka
        shell: bash
        run: |
          # Compiling as a module to create the .pyd
          # Using --output-dir to keep the build organized
          python -m nuitka --module \
            --lto=yes \
            --assume-yes-for-downloads \
            --output-dir=build_out \
            DrissionPage

      - name: Prepare Assets & Update Pages
        shell: pwsh
        run: |
          $VERSION = "${{ github.event.inputs.version }}"
          $TargetDir = "deploy_folder/releases/$VERSION"
          if (!(Test-Path $TargetDir)) { New-Item -ItemType Directory -Force -Path $TargetDir }
          
          # Nuitka puts output in build_out. 
          # We search for the .pyd and rename it to your exact target name.
          $CompiledFile = Get-ChildItem -Path "build_out" -Filter "DrissionPage*.pyd" | Select-Object -First 1
          $FinalName = "drissionpage_win_amd64.pyd"
          
          if ($CompiledFile) {
              Copy-Item $CompiledFile.FullName "$TargetDir/$FinalName"
              
              # Generate SHA256 Hash
              $Hash = (Get-FileHash "$TargetDir/$FinalName" -Algorithm SHA256).Hash
              $Hash | Out-File -FilePath "$TargetDir/hash.txt" -Encoding ascii
              
              # Create index.html for this specific release
              $Html = @"
          <html>
          <head><title>DrissionPage $VERSION Build</title></head>
          <body>
            <h1>DrissionPage $VERSION</h1>
            <p>Compiled with Nuitka (LTO Enabled)</p>
            <ul>
              <li><a href='$FinalName'>Download $FinalName</a></li>
              <li><a href='hash.txt'>SHA256 Hash</a></li>
            </ul>
            <p>Built on: $((Get-Date).ToString())</p>
          </body>
          </html>
          "@
              $Html | Out-File -FilePath "$TargetDir/index.html" -Encoding utf8
          } else {
              Write-Error "FATAL: Compiled .pyd file not found in build_out directory!"
              exit 1
          }

      - name: Deploy to GitHub Pages 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: deploy_folder
          branch: gh-pages
          clean: false # Keeps old releases from being deleted
          # Forces the action to use Git instead of rsync (which fails on Windows)
          git-config-name: AzzoDude
          git-config-email: AzzoDude@users.noreply.github.com
