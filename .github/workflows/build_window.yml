name: Compile DrissionPage to PYD

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'DrissionPage Version (e.g., v4.1.0.17)'
        required: true
        default: 'v4.1.0.17'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          architecture: 'x64'

      - name: Download & Extract DrissionPage
        shell: bash
        run: |
          VERSION="${{ github.event.inputs.version }}"
          URL="https://github.com/g1879/DrissionPage/archive/refs/tags/${VERSION}.zip"
          curl -L -o drission.zip "$URL"
          unzip drission.zip
          
          # Use wildcard to find the extracted folder regardless of the exact name
          EXTRACTED_DIR=$(ls -d DrissionPage-*)
          echo "Extracted directory: $EXTRACTED_DIR"
          
          # Move the actual package source (which is the subfolder inside the extracted dir)
          # We move the content to a fixed 'DrissionPage' folder in the root
          mv "$EXTRACTED_DIR" DrissionPageSource

      - name: Install Dependencies
        run: |
          pip install nuitka requests cssselect setuptools
          # Now the path is guaranteed to be DrissionPageSource/requirements.txt
          if (Test-Path "DrissionPageSource/requirements.txt") {
            pip install -r DrissionPageSource/requirements.txt
          }

      - name: Compile with Nuitka
        shell: bash
        run: |
          # We tell Nuitka to compile the folder 'DrissionPageSource' 
          # but name the output what you requested.
          python -m nuitka --module \
            --lto=yes \
            --assume-yes-for-downloads \
            --include-package=DrissionPageSource \
            --output-filename=drissionpage_win_amd64 \
            DrissionPageSource

      - name: Prepare Assets & Update Pages
        shell: pwsh
        run: |
          $VERSION = "${{ github.event.inputs.version }}"
          $TargetDir = "deploy_folder/releases/$VERSION"
          if (!(Test-Path $TargetDir)) { New-Item -ItemType Directory -Force -Path $TargetDir }
          
          # Find the compiled file (Nuitka usually adds suffix, we rename to clean)
          $CompiledFile = Get-ChildItem -Filter "drissionpage_win_amd64*.pyd" | Select-Object -First 1
          $FinalName = "drissionpage_win_amd64.pyd"
          
          if ($CompiledFile) {
              Copy-Item $CompiledFile.FullName "$TargetDir/$FinalName"
              
              # Generate Hash
              $Hash = (Get-FileHash "$TargetDir/$FinalName" -Algorithm SHA256).Hash
              $Hash | Out-File -FilePath "$TargetDir/hash.txt" -Encoding ascii
              
              # Simple HTML
              $Html = "<html><body><h1>DrissionPage $VERSION</h1><a href='$FinalName'>$FinalName</a><br><a href='hash.txt'>Hash (SHA256)</a></body></html>"
              $Html | Out-File -FilePath "$TargetDir/index.html" -Encoding utf8
          } else {
              Write-Error "Compiled .pyd file not found!"
              exit 1
          }

      - name: Deploy to GitHub Pages 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: deploy_folder
          branch: gh-pages
          clean: false
