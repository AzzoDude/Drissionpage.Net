name: Compile DrissionPage to PYD

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'DrissionPage Version (e.g., v4.1.0.17)'
        required: true
        default: 'v4.1.0.17'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Necessary for pushing back to the repo

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          architecture: 'x64'

      - name: Download & Extract DrissionPage
        shell: bash
        run: |
          VERSION="${{ github.event.inputs.version }}"
          URL="https://github.com/g1879/DrissionPage/archive/refs/tags/${VERSION}.zip"
          curl -L -o drission.zip "$URL"
          unzip drission.zip
          EXTRACTED_DIR=$(ls -d DrissionPage-*)
          mv "$EXTRACTED_DIR" DrissionPage

      - name: Install Dependencies
        run: |
          pip install nuitka requests cssselect setuptools
          if (Test-Path "DrissionPage/requirements.txt") {
            pip install -r DrissionPage/requirements.txt
          }

      - name: Compile with Nuitka
        shell: bash
        run: |
          python -m nuitka --module \
            --lto=yes \
            --assume-yes-for-downloads \
            --output-dir=build_out \
            DrissionPage

      - name: Prepare Assets & Update Pages
        shell: pwsh
        run: |
          $VERSION = "${{ github.event.inputs.version }}"
          $TargetDir = "deploy_folder/releases/$VERSION"
          if (!(Test-Path $TargetDir)) { New-Item -ItemType Directory -Force -Path $TargetDir }
          
          $CompiledFile = Get-ChildItem -Path "build_out" -Filter "DrissionPage*.pyd" | Select-Object -First 1
          $FinalName = "drissionpage_win_amd64.pyd"
          
          if ($CompiledFile) {
              Copy-Item $CompiledFile.FullName "$TargetDir/$FinalName"
              $Hash = (Get-FileHash "$TargetDir/$FinalName" -Algorithm SHA256).Hash
              $Hash | Out-File -FilePath "$TargetDir/hash.txt" -Encoding ascii
              
              $Html = @"
          <html>
          <body style='font-family: sans-serif; padding: 30px; line-height: 1.6;'>
            <h1>DrissionPage $VERSION Build</h1>
            <div style='background: #f4f4f4; padding: 15px; border-radius: 8px;'>
              <p><strong>Binary:</strong> <a href='$FinalName'>$FinalName</a></p>
              <p><strong>SHA256:</strong> <a href='hash.txt'>View Hash</a></p>
            </div>
            <p><small>Automated build for AzzoDude</small></p>
          </body>
          </html>
          "@
              $Html | Out-File -FilePath "$TargetDir/index.html" -Encoding utf8
          } else {
              Write-Error "FATAL: Compiled .pyd file not found!"
              exit 1
          }

      - name: Deploy via Pure Git 🚀
        shell: pwsh
        run: |
          # Configure Identity
          git config --global user.name "AzzoDude"
          git config --global user.email "AzzoDude@users.noreply.github.com"
          
          # Initialize the deploy folder as a separate repo
          cd deploy_folder
          git init
          git checkout -b gh-pages
          git add .
          git commit -m "Deploy DrissionPage ${{ github.event.inputs.version }} to Pages"
          
          # Force push to the gh-pages branch of your repo
          # The GITHUB_TOKEN is used for authentication
          $RepoUrl = "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git push $RepoUrl gh-pages --force
