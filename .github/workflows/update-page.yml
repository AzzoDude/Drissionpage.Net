name: Update Release Page
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to display'
        required: true
        default: 'v4.1.0.17'
  workflow_run:
    workflows: ["Compile Win x64", "Compile Win ARM64"]
    types: [completed]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  deploy:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate Attestations
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: 'artifacts/**/*.pyd'

      - name: Build Terminal UI
        shell: pwsh
        run: |
          $V = "${{ github.event.inputs.version }}"
          $Deploy = "deploy_folder"
          $Rel = "$Deploy/releases/$V"
          New-Item -ItemType Directory -Force -Path $Rel
          
          # Collect all binaries
          Get-ChildItem -Path "artifacts" -Filter "*.pyd" -Recurse | Copy-Item -Destination $Rel
          
          $HTML = @"
          <!DOCTYPE html>
          <html>
          <head>
            <title>DrissionPage.Net / $V</title>
            <style>
              body { background: #000; color: #fff; font-family: 'Consolas', monospace; padding: 40px; line-height: 1.6; }
              .header { color: #888; border-bottom: 1px solid #222; padding-bottom: 10px; margin-bottom: 30px; }
              .entry { margin-bottom: 30px; }
              .file-link { color: #fff; text-decoration: none; font-weight: bold; border: 1px solid transparent; }
              .file-link:hover { background: #fff; color: #000; border: 1px solid #fff; }
              .details { color: #666; font-size: 0.85em; margin-top: 4px; }
              .hash { color: #333; font-size: 0.75em; word-break: break-all; margin-top: 2px; }
              primary { color: #fff; font-weight: bold; }
              .cmd { color: #fff; }
            </style>
          </head>
          <body>
            <div class="header">AzzoDude@DrissionPage:~/builds/$V$ ls -la</div>
          "@

          foreach ($f in Get-ChildItem $Rel -Filter "*.pyd") {
              $size = [math]::Round($f.Length/1KB, 2)
              $hash = (Get-FileHash $f.FullName).Hash
              $HTML += @"
            <div class="entry">
              <span class="cmd">></span> <a class="file-link" href="releases/$V/$($f.Name)">$($f.Name)</a>
              <div class="details">SIZE: $($size)KB | STATUS: VERIFIED_BUILD</div>
              <div class="hash">SHA256: $hash</div>
            </div>
          "@
          }

          $HTML += "</body></html>"
          $HTML | Out-File "$Deploy/index.html" -Encoding utf8

      - name: Pure Git Deploy
        shell: pwsh
        run: |
          cd deploy_folder
          git init
          git checkout -b gh-pages
          git add .
          git config user.name "AzzoDude"
          git config user.email "AzzoDude@users.noreply.github.com"
          git commit -m "update: $V binary distribution"
          $url = "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git push $url gh-pages --force